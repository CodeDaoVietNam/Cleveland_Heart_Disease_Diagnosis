name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Thiết lập môi trường Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Cài đặt thư viện (Dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Linter kiểm tra cú pháp (Flake8)
      run: |
        # Dừng quá trình nếu có lỗi cú pháp Python nghiêm trọng (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Cảnh báo các file code quá phức tạp hoặc dòng quá dài
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Chạy kiểm thử tự động (Pytest)
      run: |
        pytest tests/ -v
